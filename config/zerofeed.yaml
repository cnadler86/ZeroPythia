# ZeroFeed configuration
# Exactly one phase has role: feedback (regulation phase = battery phase).
# All other phases have role: feedforward (steering phase, no battery inverter).
# This file is updated automatically by the dashboard; comments are preserved.
language: de  # Dashboard UI language: en (English) | de (German)
control_phase: B  # Phase with battery inverter (A, B or C)
target_power_w: 1.0 # Desired total grid draw [W].  3 W = slight import, prevents feed-in
min_output_w: 20 # Minimum battery output [W] (hardware limit, e.g. 20 W)
max_output_w: 800 # Maximum battery output [W] (hardware limit, e.g. 800 W)
watchdog_cycles: 3 # Number of control cycles for feed-in trigger (used by ControlRuntime watchdog)
watchdog_threshold_w: -10.0 # Feed-in threshold [W], must be negative (ControlRuntime watchdog)
control_interval_s: 3.0 # Control cycle interval [s]
sampling_interval_s: 1.0 # Sampling interval [s]
battery_dead_time_s: 1.1
battery_pt1_tau_s: 0.5

# Auto-update via Git
# mode: off | release | master
#   off     – no automatic updates
#   release – update when a new semver release tag is available
#   master  – update when the remote master branch has new commits
# Updates are only applied when the system is idle (not discharging / charging).
update:
  mode: "master"     # Change to 'release' or 'master' to enable
  branch: master  # Remote branch to track (used when mode=master)
  remote: origin  # Name of the git remote

# Per-phase controller settings
# ────────────────────────────────────────────────────────────────────────────
# Bypass resume guard (full-battery bypass → discharge anti-toggling)
# ────────────────────────────────────────────────────────────────────────────
# Problem: when the battery is at 100 % SoC the inverter enters bypass mode
# (solar PV flows directly to the load).  Starting discharge in this state
# can cause rapid toggling: battery starts → solar+battery over-supply →
# ZFI pulls battery back to 0 → inverter returns to bypass → repeat.
#
# Solution: before allowing discharge to start the runtime checks that, over
# a rolling observation window, the *theoretical battery setpoint* (≈ household
# consumption = total_grid_w + solar_input_w) has *always* exceeded
#   max(solar_in_window) + bypass_resume_safety_offset_w
#
# The observation window duration is NOT user-configurable; it is derived
# automatically from the oscillation-holder settings of the active regulator:
#
#   window_s = max( holder.max_period ) × max( holder.min_rising_count ) + 1 s
#
# Example with default holder config (max_period=8 s, min_rising_count=3):
#   window_s = 8 × 3 + 1 = 25 s
#
# This ensures the guard covers at least one full oscillation-detection cycle,
# making it very unlikely that a newly started discharge will re-trigger the
# bypass/discharge toggling pattern.
#
# The only user-tunable parameter is the safety offset, passed as
# bypass_resume_safety_offset_w to ControlRuntime (default: 30 W).
# It can be adjusted in main.py or left at the default.
#
# Tuning the holder settings (max_period, min_rising_count below) also
# implicitly changes the bypass guard window – no separate config is needed.
phases:

# Phase A (Steering – no battery inverter)
  A:
    role: feedforward  # feedback = regulation (battery phase)  |  feedforward = steering
    kp: 1.0 # P-gain outside hysteresis band.  1.0 = full compensation
    kp_hysteresis: 0.4 # Damped gain inside hysteresis band
    hysteresis_w: 5.0 # Hysteresis band [W].  Inside: kp_hysteresis active  Outside: kp / kp_draw
#   Oscillation detectors
    osc:
#     Holder – fast short-cycle oscillations (period < ~10 s)
      holder:
        threshold: 15.0  # Minimum amplitude [W] to confirm oscillation
        min_period: 1.0 # Shortest detectable period [s]
        max_period: 8.0 # Longest detectable period [s]
        period_variance: 1.2 # Allowed jitter factor for period matching
        time_threshold: 0.6 # Minimum duty cycle (0..1) – fraction of cycle the load must be active
        min_rising_count: 3 # Minimum rising edges required to confirm oscillation
#     Predictor – periodic loads with known cycle time (e.g. washing machine)
        merge_mode: first
        base_load_window: 3
      predictor:
        threshold: 100.0
        min_period: 8.0
        max_period: 120.0
        period_variance: 2
        time_threshold: 2.0
        merge_mode: first
        min_rising_count: 3
        base_load_window: 2
        reaction_time: 4.0
  B:
    role: feedback  # feedback = regulation (battery phase)  |  feedforward = steering
    kp_draw: 0.9 # P-gain when drawing from grid
    kp_feed_in: 1.05 # P-gain when feeding into grid (higher = more aggressive pull-back)
    feedback_enabled: true # false = pure feedforward mode (for testing)
    kp_hysteresis: 0.4 # Damped gain inside hysteresis band
    hysteresis_w: 5.0 # Hysteresis band [W].  Inside: kp_hysteresis active  Outside: kp / kp_draw
#   Oscillation detectors
    osc:
#     Holder – fast short-cycle oscillations (period < ~10 s)
      holder:
        threshold: 30.0  # Minimum amplitude [W] to confirm oscillation
        min_period: 1.0 # Shortest detectable period [s]
        max_period: 8.0 # Longest detectable period [s]
        period_variance: 1.2 # Allowed jitter factor for period matching
        time_threshold: 0.6 # Minimum duty cycle (0..1) – fraction of cycle the load must be active
        min_rising_count: 3 # Minimum rising edges required to confirm oscillation
#     Predictor – periodic loads with known cycle time (e.g. washing machine)
        merge_mode: first
        base_load_window: 3
      predictor:
        threshold: 80.0   # Minimum amplitude [W] to confirm periodic load
        min_period: 8.0 # Shortest detectable period [s]
        max_period: 120.0 # Longest detectable period [s]
        period_variance: 2.0 # Allowed jitter factor for period matching
        time_threshold: 2.0 # Minimum duty cycle to confirm periodic load
        min_rising_count: 3 # Minimum rising edges required to confirm periodic load
        reaction_time: 4.0 # Lead time [s] before expected load peak – battery output reduced early
        merge_mode: first
        base_load_window: 2
  C:
    role: feedforward  # feedback = regulation (battery phase)  |  feedforward = steering
    kp: 1.0 # P-gain outside hysteresis band.  1.0 = full compensation
    kp_hysteresis: 0.4 # Damped gain inside hysteresis band
    hysteresis_w: 5.0 # Hysteresis band [W].  Inside: kp_hysteresis active  Outside: kp / kp_draw
#   Oscillation detectors
    osc:
#     Holder – fast short-cycle oscillations (period < ~10 s)
      holder:
        threshold: 15.0  # Minimum amplitude [W] to confirm oscillation
        min_period: 1.0 # Shortest detectable period [s]
        max_period: 8.0 # Longest detectable period [s]
        period_variance: 1.2 # Allowed jitter factor for period matching
        time_threshold: 0.6 # Minimum duty cycle (0..1) – fraction of cycle the load must be active
        min_rising_count: 3 # Minimum rising edges required to confirm oscillation
#     Predictor – periodic loads with known cycle time (e.g. washing machine)
        merge_mode: first
        base_load_window: 3
      predictor:
        threshold: 80.0   # Minimum amplitude [W] to confirm periodic load
        min_period: 8.0 # Shortest detectable period [s]
        max_period: 120.0 # Longest detectable period [s]
        period_variance: 2.0 # Allowed jitter factor for period matching
        time_threshold: 2.0 # Minimum duty cycle to confirm periodic load
        min_rising_count: 3 # Minimum rising edges required to confirm periodic load
        reaction_time: 4.0 # Lead time [s] before expected load peak – battery output reduced early
        merge_mode: first
        base_load_window: 2
